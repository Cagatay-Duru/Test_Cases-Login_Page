<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="login-card">
            <h1>Login</h1>

            <form id="loginForm" novalidate autocomplete="off">
                <div class="form-group" id="usernameGroup">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="off">
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group" id="passwordGroup">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="off">
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Login</button>
            </form>

            <div class="alert-message" id="alertMessage"></div>

            <div class="credentials-info">
                <p>Valid Username: <strong>admin</strong></p>
                <p>Valid Password: <strong>Admin1234</strong></p>
            </div>
        </div>
    </div>

    <div class="dashboard-container" id="dashboardContainer" style="display: none;">
        <div class="dashboard-card">
            <h1>Dashboard</h1>
            <p id="welcomeText">You have successfully logged in!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
